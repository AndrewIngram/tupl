name: Publish Preview Pull Requests

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

env:
  PREVIEW_LABEL: preview

jobs:
  publish:
    if: contains(github.event.pull_request.labels.*.name, env.PREVIEW_LABEL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build publishable package
        run: vp run -r build

      - name: Publish preview packages
        run: pnpm dlx pkg-pr-new publish --pnpm --packageManager=pnpm .
