name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run lint
        run: vp lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run workspace typecheck
        run: vp run -r typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run workspace tests
        run: vp run -r test

      - name: Upload coverage HTML report
        id: upload_coverage_artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

      - name: Find latest main coverage baseline
        id: baseline
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'ci.yml';
            const artifactName = 'coverage-report';
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch: 'main',
              event: 'push',
              status: 'success',
              per_page: 100,
            });

            let baselineRunId = null;
            for (const run of runs) {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              });
              const coverageArtifact = artifacts.find(
                (artifact) => artifact.name === artifactName && !artifact.expired,
              );
              if (coverageArtifact) {
                baselineRunId = run.id;
                break;
              }
            }

            core.setOutput('found', baselineRunId ? 'true' : 'false');
            if (baselineRunId) {
              core.setOutput('run-id', String(baselineRunId));
            }

      - name: Download main coverage baseline
        if: steps.baseline.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: baseline-coverage
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.baseline.outputs.run-id }}

      - name: Build coverage comment
        if: github.event_name == 'pull_request'
        env:
          COVERAGE_ARTIFACT_URL: ${{ steps.upload_coverage_artifact.outputs.artifact-url }}
          BASELINE_FOUND: ${{ steps.baseline.outputs.found }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");
          const path = require("node:path");

          const marker = "<!-- coverage-report -->";
          const currentSummaryPath = path.join("coverage", "coverage-summary.json");

          function readSummary(summaryPath) {
            const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
            return summary.total;
          }

          function findBaselineSummaryPath() {
            const stack = ["baseline-coverage"];
            while (stack.length > 0) {
              const currentPath = stack.pop();
              if (!currentPath || !fs.existsSync(currentPath)) {
                continue;
              }
              const stat = fs.statSync(currentPath);
              if (stat.isDirectory()) {
                for (const entry of fs.readdirSync(currentPath)) {
                  stack.push(path.join(currentPath, entry));
                }
                continue;
              }
              if (path.basename(currentPath) === "coverage-summary.json") {
                return currentPath;
              }
            }
            return null;
          }

          function formatMetric(metric) {
            return `${metric.pct.toFixed(2)}% (${metric.covered}/${metric.total})`;
          }

          function formatDelta(currentMetric, baselineMetric) {
            const delta = currentMetric.pct - baselineMetric.pct;
            return `${delta >= 0 ? "+" : ""}${delta.toFixed(2)} pp`;
          }

          const current = readSummary(currentSummaryPath);
          const baselineSummaryPath =
            process.env.BASELINE_FOUND === "true" ? findBaselineSummaryPath() : null;
          const baseline = baselineSummaryPath ? readSummary(baselineSummaryPath) : null;
          const metrics = ["lines", "statements", "functions", "branches"];
          const coverageUrl =
            process.env.COVERAGE_ARTIFACT_URL ||
            `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

          const lines = [
            marker,
            "## Coverage Report",
            "",
            `Artifact: [coverage-report](${coverageUrl})`,
            "",
          ];

          if (baseline) {
            lines.push("| Metric | PR | main | Delta |");
            lines.push("| --- | --- | --- | --- |");
            for (const metric of metrics) {
              lines.push(
                `| ${metric} | ${formatMetric(current[metric])} | ${formatMetric(
                  baseline[metric],
                )} | ${formatDelta(current[metric], baseline[metric])} |`,
              );
            }
          } else {
            lines.push("| Metric | PR |");
            lines.push("| --- | --- |");
            for (const metric of metrics) {
              lines.push(`| ${metric} | ${formatMetric(current[metric])} |`);
            }
            lines.push("");
            lines.push(
              "Baseline coverage from the latest successful `main` run was not available, so no delta is shown.",
            );
          }

          lines.push("");
          lines.push("_Same-repo pull requests only. Fork and Dependabot pull requests do not receive this comment because their workflow token is read-only._");
          lines.push("");

          fs.writeFileSync(path.join("coverage", "pr-comment.md"), `${lines.join("\n")}\n`);
          EOF

      - name: Append PR coverage delta to job summary
        if: github.event_name == 'pull_request'
        run: cat coverage/pr-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- coverage-report -->';
            const body = fs.readFileSync('coverage/pr-comment.md', 'utf8');
            const issueNumber = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existingComment = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
